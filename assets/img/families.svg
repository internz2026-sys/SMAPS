<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 620" font-family="Public Sans, system-ui, sans-serif">
  <rect width="520" height="620" fill="#E8F0FC"/>

  <!-- phone card, centered so cover-crop trims the tint, not the content -->
  <g>
    <rect x="128" y="46" width="264" height="528" rx="26" fill="#FDFDFC" stroke="#E5E9F0" stroke-width="1"/>

    <!-- navy header -->
    <path d="M128 72 a26 26 0 0 1 26 -26 h212 a26 26 0 0 1 26 26 v52 h-264 z" fill="#0F2447"/>
    <text x="152" y="92" fill="#B9C7DE" font-size="10" font-weight="600" letter-spacing="0.5">SMAPS · Parent Portal</text>
    <text x="152" y="112" fill="#FFFFFF" font-size="15" font-weight="700">Good morning, Mrs. Santos</text>

    <!-- student summary -->
    <circle cx="164" cy="162" r="18" fill="#E8F0FC"/>
    <text x="164" y="167" text-anchor="middle" fill="#1D5FBF" font-size="12" font-weight="700">MS</text>
    <text x="192" y="157" fill="#141D2E" font-size="14" font-weight="700">Maria Santos</text>
    <text x="192" y="174" fill="#9AA7BC" font-size="11">Grade 4 · St. Peter</text>
    <line x1="152" y1="196" x2="368" y2="196" stroke="#E5E9F0" stroke-width="1"/>

    <!-- attendance ring -->
    <circle cx="182" cy="248" r="30" fill="none" stroke="#E5E9F0" stroke-width="9"/>
    <circle cx="182" cy="248" r="30" fill="none" stroke="#1D5FBF" stroke-width="9" stroke-linecap="round" stroke-dasharray="181 188.5" transform="rotate(-90 182 248)"/>
    <text x="182" y="246" text-anchor="middle" fill="#0F2447" font-size="15" font-weight="700">96%</text>
    <text x="182" y="261" text-anchor="middle" fill="#9AA7BC" font-size="8" font-weight="600">PRESENT</text>
    <text x="230" y="238" fill="#141D2E" font-size="12" font-weight="700">Attendance</text>
    <text x="230" y="255" fill="#4A5A75" font-size="10">This quarter · 2 excused</text>

    <!-- grades -->
    <text x="152" y="306" fill="#9AA7BC" font-size="9" font-weight="700" letter-spacing="1">LATEST GRADES</text>
    <!-- Math -->
    <text x="152" y="330" fill="#141D2E" font-size="11" font-weight="600">Mathematics</text>
    <rect x="248" y="323" width="88" height="6" rx="3" fill="#E5E9F0"/>
    <rect x="248" y="323" width="83" height="6" rx="3" fill="#1D5FBF"/>
    <text x="368" y="331" text-anchor="end" fill="#0F2447" font-size="11" font-weight="700">93</text>
    <!-- English -->
    <text x="152" y="354" fill="#141D2E" font-size="11" font-weight="600">English</text>
    <rect x="248" y="347" width="88" height="6" rx="3" fill="#E5E9F0"/>
    <rect x="248" y="347" width="77" height="6" rx="3" fill="#1D5FBF"/>
    <text x="368" y="355" text-anchor="end" fill="#0F2447" font-size="11" font-weight="700">88</text>
    <!-- Science -->
    <text x="152" y="378" fill="#141D2E" font-size="11" font-weight="600">Science</text>
    <rect x="248" y="371" width="88" height="6" rx="3" fill="#E5E9F0"/>
    <rect x="248" y="371" width="79" height="6" rx="3" fill="#1D5FBF"/>
    <text x="368" y="379" text-anchor="end" fill="#0F2447" font-size="11" font-weight="700">90</text>

    <!-- fee balance box -->
    <rect x="152" y="404" width="216" height="60" rx="6" fill="#E8F0FC"/>
    <text x="168" y="428" fill="#5B6B85" font-size="10" font-weight="600">Outstanding balance</text>
    <text x="168" y="452" fill="#0F2447" font-size="18" font-weight="700" font-family="Source Serif 4, serif">&#8369;2,500.00</text>
    <text x="352" y="452" text-anchor="end" fill="#1D5FBF" font-size="10" font-weight="700">Due Jul 30</text>

    <!-- message teacher button -->
    <rect x="152" y="484" width="216" height="40" rx="4" fill="#1D5FBF"/>
    <text x="260" y="509" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="700">Message teacher</text>
    <text x="260" y="548" text-anchor="middle" fill="#9AA7BC" font-size="10">View full progress report</text>
  </g>
</svg>
